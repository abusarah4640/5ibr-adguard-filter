name: Build 5ibr Filters

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate Filters
        run: |
          python scripts/validate.py

      - name: Run Tests
        run: |
          pytest

      - name: Build Releases
        run: |
          python scripts/build.py

      - name: Upload Release Files
        uses: actions/upload-artifact@v4
        with:
          name: fivebr-release
          path: releases/