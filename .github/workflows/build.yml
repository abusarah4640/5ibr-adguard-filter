name: Build 5ibr Filters

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Validate Filters
        run: |
          python scripts/validate.py

      - name: Run Unit Tests
        run: |
          pytest -v

      - name: Build Releases
        run: |
          python scripts/build.py

      - name: Analyze Query Log (Optional)
        run: |
          if [ -f querylog.json ]; then
            python scripts/analyze_querylog.py
          else
            echo "querylog.json not found, skipping analysis."
          fi

      - name: Generate Reports
        run: |
          if [ -f reports/new_candidates.csv ]; then
            python scripts/report.py
            python scripts/html_report.py
          else
            echo "No analysis results found, skipping reports."
          fi

      - name: Upload Release Files
        uses: actions/upload-artifact@v4
        with:
          name: fivebr-releases
          path: releases/

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fivebr-reports
          path: reports/
          if-no-files-found: ignore