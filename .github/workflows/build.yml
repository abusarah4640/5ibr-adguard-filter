name: Build Filters

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Filters
        run: |
          python scripts/build.py

      - name: Commit Generated Release
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto build release